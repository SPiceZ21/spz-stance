name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Debug Environment
        run: |
          echo "Checking paths..."
          which node
          which npm
          which zip
          which find
          node -v
          npm -v

      - name: Install & Build UI
        run: |
          set -e
          if [ -d "ui" ] && [ -f "ui/package.json" ]; then
            echo "Building UI in ui/ folder..."
            cd ui
            npm install --no-audit --no-fund
            npm run build
            echo "Post-build contents of ui/:"
            ls -F
            cd ..
          elif [ -d "html" ] && [ -f "html/package.json" ]; then
            echo "Building UI in html/ folder..."
            cd html
            npm install --no-audit --no-fund
            npm run build
            echo "Post-build contents of html/:"
            ls -F
            cd ..
          else
            echo "No UI directory found."
          fi

      - name: Remove node_modules
        run: |
          rm -rf ui/node_modules 2>/dev/null || true
          rm -rf html/node_modules 2>/dev/null || true

      - name: Package Resource
        run: |
          set -e
          RESOURCE_NAME=$(basename $(pwd))
          echo "Packaging resource: $RESOURCE_NAME"
          
          PKG_DIR="release-pkg/$RESOURCE_NAME"
          mkdir -p "$PKG_DIR"
          
          # Copy Lua and manifest
          [ -d "client" ] && cp -r client "$PKG_DIR/"
          [ -d "server" ] && cp -r server "$PKG_DIR/"
          [ -f "fxmanifest.lua" ] && cp fxmanifest.lua "$PKG_DIR/"
          
          # Copy UI Build
          if [ -d "ui/dist" ]; then
            echo "Packaging ui/dist"
            mkdir -p "$PKG_DIR/ui/dist"
            cp -r ui/dist/* "$PKG_DIR/ui/dist/"
          elif [ -d "html/dist" ]; then
            echo "Packaging html/dist"
            mkdir -p "$PKG_DIR/html/dist"
            cp -r html/dist/* "$PKG_DIR/html/dist/"
          fi
          
          echo "Final Package structure:"
          ls -R "$PKG_DIR"
          
          cd release-pkg
          zip -r "../${RESOURCE_NAME}.zip" "$RESOURCE_NAME"

      - name: Generate Release Notes
        id: notes
        run: |
          TAG="v$(date +"%Y.%m.%d")-${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          echo "## Release Notes" > release_notes.md
          echo "Built from commit \`${{ github.sha }}\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Changes" >> release_notes.md
          
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            git log --oneline --no-merges -n 20 >> release_notes.md
          else
            git log ${LAST_TAG}..HEAD --oneline --no-merges >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: "Release ${{ steps.notes.outputs.tag }}"
          body_path: release_notes.md
          files: "*.zip"
          make_latest: true

