name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install & Build UI
        shell: bash
        run: |
          if [ -d "ui" ] && [ -f "ui/package.json" ]; then
            echo "Building UI in ui/ folder..."
            cd ui
            npm install --no-audit --no-fund
            # Fix permissions for binaries
            [ -d "node_modules/.bin" ] && chmod +x node_modules/.bin/* || true
            npm run build
            echo "Post-build check:"
            ls -la dist || echo "ERROR: dist folder not found in ui/"
          elif [ -d "html" ] && [ -f "html/package.json" ]; then
            echo "Building UI in html/ folder..."
            cd html
            npm install --no-audit --no-fund
            # Fix permissions for binaries
            [ -d "node_modules/.bin" ] && chmod +x node_modules/.bin/* || true
            npm run build
            echo "Post-build check:"
            ls -la dist || echo "ERROR: dist folder not found in html/"
          else
            echo "No UI directory (ui/ or html/) found with package.json"
          fi

      - name: Remove node_modules (Clean Version)
        shell: bash
        run: |
          rm -rf ui/node_modules 2>/dev/null || true
          rm -rf html/node_modules 2>/dev/null || true
          echo "node_modules deleted for clean release."

      - name: Package Resource
        shell: bash
        run: |
          RESOURCE_NAME=$(basename $(pwd))
          echo "Packaging resource: $RESOURCE_NAME"
          
          PKG_DIR="release-pkg/$RESOURCE_NAME"
          mkdir -p "$PKG_DIR"
          
          # Copy Lua scripts and manifest
          [ -d "client" ] && cp -r client "$PKG_DIR/" && echo "Copied client/"
          [ -d "server" ] && cp -r server "$PKG_DIR/" && echo "Copied server/"
          [ -f "fxmanifest.lua" ] && cp fxmanifest.lua "$PKG_DIR/" && echo "Copied fxmanifest.lua"
          
          # Copy UI Build (dist)
          if [ -d "ui/dist" ]; then
            echo "Found ui/dist. Copying to $PKG_DIR/ui/dist"
            mkdir -p "$PKG_DIR/ui/dist"
            cp -r ui/dist/* "$PKG_DIR/ui/dist/"
          elif [ -d "html/dist" ]; then
            echo "Found html/dist. Copying to $PKG_DIR/html/dist"
            mkdir -p "$PKG_DIR/html/dist"
            cp -r html/dist/* "$PKG_DIR/html/dist/"
          fi
          
          # Final Verification
          echo "Final Package Structure:"
          find "$PKG_DIR" -maxdepth 3
          
          cd release-pkg
          zip -rq "../${RESOURCE_NAME}.zip" "$RESOURCE_NAME"
          echo "Created ${RESOURCE_NAME}.zip"

      - name: Generate Release Notes
        id: notes
        shell: bash
        run: |
          TAG="v$(date +"%Y.%m.%d")-${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          echo "## Release Notes" > release_notes.md
          echo "Built from commit \`${{ github.sha }}\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Changes" >> release_notes.md
          
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            git log --oneline --no-merges -n 20 >> release_notes.md
          else
            git log ${LAST_TAG}..HEAD --oneline --no-merges >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: "Release ${{ steps.notes.outputs.tag }}"
          body_path: release_notes.md
          files: "*.zip"
          make_latest: true
