name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install & Build UI
        shell: bash
        run: |
          if [ -d "ui" ] && [ -f "ui/package.json" ]; then
            echo "Building UI in ui/ folder..."
            cd ui
            npm install --no-audit --no-fund
            [ -d "node_modules/.bin" ] && chmod +x node_modules/.bin/* || true
            npm run build
            cd ..
          elif [ -d "html" ] && [ -f "html/package.json" ]; then
            echo "Building UI in html/ folder..."
            cd html
            npm install --no-audit --no-fund
            [ -d "node_modules/.bin" ] && chmod +x node_modules/.bin/* || true
            npm run build
            cd ..
          fi

      - name: Package Resource
        shell: bash
        run: |
          RESOURCE_NAME=$(basename $(pwd))
          PKG_DIR="release-pkg/$RESOURCE_NAME"
          mkdir -p "$PKG_DIR"
          
          # Copy Lua scripts, configs, and assets
          [ -d "client" ] && cp -r client "$PKG_DIR/"
          [ -d "server" ] && cp -r server "$PKG_DIR/"
          [ -d "shared" ] && cp -r shared "$PKG_DIR/"
          [ -d "data" ] && cp -r data "$PKG_DIR/"
          [ -d "locales" ] && cp -r locales "$PKG_DIR/"
          [ -f "fxmanifest.lua" ] && cp fxmanifest.lua "$PKG_DIR/"
          [ -f "config.lua" ] && cp config.lua "$PKG_DIR/"
          [ -f "version.json" ] && cp version.json "$PKG_DIR/"
          
          # Copy UI Build (dist)
          if [ -d "ui/dist" ]; then
            mkdir -p "$PKG_DIR/ui/dist"
            cp -r ui/dist/* "$PKG_DIR/ui/dist/"
          elif [ -d "html/dist" ]; then
            mkdir -p "$PKG_DIR/html/dist"
            cp -r html/dist/* "$PKG_DIR/html/dist/"
          fi
          
          # Verify
          echo "Package Structure:"
          find "$PKG_DIR" -maxdepth 3
          
          cd release-pkg
          zip -rq "../${RESOURCE_NAME}.zip" "$RESOURCE_NAME"

      - name: Generate Release Notes
        id: notes
        shell: bash
        run: |
          TAG="v$(date +"%Y.%m.%d")-${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "## Release Notes" > release_notes.md
          echo "Built from commit \`${{ github.sha }}\`" >> release_notes.md
          
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            git log --oneline --no-merges -n 20 >> release_notes.md
          else
            git log ${LAST_TAG}..HEAD --oneline --no-merges >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: "Release ${{ steps.notes.outputs.tag }}"
          body_path: release_notes.md
          files: "*.zip"
          make_latest: true
