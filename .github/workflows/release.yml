name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Build UI
        run: |
          if [ -d "ui" ] && [ -f "ui/package.json" ]; then
            echo "::group::Building UI"
            cd ui && npm ci && npm run build
            echo "::endgroup::"
          elif [ -d "html" ] && [ -f "html/package.json" ]; then
            echo "::group::Building HTML UI"
            cd html && npm ci && npm run build
            echo "::endgroup::"
          fi

      - name: Remove node_modules (Clean Version)
        run: |
          rm -rf ui/node_modules 2>/dev/null || true
          rm -rf html/node_modules 2>/dev/null || true
          echo "node_modules deleted for clean release."

      - name: Package Resource
        run: |
          RESOURCE_NAME=$(basename $(pwd))
          echo "Packaging $RESOURCE_NAME"
          mkdir -p release-pkg/${RESOURCE_NAME}
          
          # Copy Lua scripts and manifest
          [ -d "client" ] && cp -r client release-pkg/${RESOURCE_NAME}/
          [ -d "server" ] && cp -r server release-pkg/${RESOURCE_NAME}/
          [ -f "fxmanifest.lua" ] && cp fxmanifest.lua release-pkg/${RESOURCE_NAME}/
          
          # Copy UI Build (dist) explicitly
          if [ -d "ui/dist" ]; then
            echo "Copying ui/dist contents..."
            mkdir -p release-pkg/${RESOURCE_NAME}/ui/dist
            cp -r ui/dist/* release-pkg/${RESOURCE_NAME}/ui/dist/
          elif [ -d "html/dist" ]; then
            echo "Copying html/dist contents..."
            mkdir -p release-pkg/${RESOURCE_NAME}/html/dist
            cp -r html/dist/* release-pkg/${RESOURCE_NAME}/html/dist/
          fi
          
          # Debug structure
          echo "Final Package Structure:"
          find release-pkg -maxdepth 3
          
          cd release-pkg
          zip -rq ../${RESOURCE_NAME}.zip ${RESOURCE_NAME}
          echo "Packaged ${RESOURCE_NAME}.zip"

      - name: Generate Release Notes
        id: notes
        run: |
          TAG="v$(date +"%Y.%m.%d")-${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          echo "## Release Notes" > release_notes.md
          echo "Built from commit \`${{ github.sha }}\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Changes" >> release_notes.md
          
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            git log --oneline --no-merges -n 20 >> release_notes.md
          else
            git log ${LAST_TAG}..HEAD --oneline --no-merges >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: "Release ${{ steps.notes.outputs.tag }}"
          body_path: release_notes.md
          files: "*.zip"
          make_latest: true

