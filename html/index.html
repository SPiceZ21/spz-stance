<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <title>SPZ Stancer</title>
</head>
<body>
    <div id="container" style="display:none;">
        <div class="watermark">STANCER</div>
        
        <form>
            <div class="header">
                <span class="brand">SPZ</span>
                <h1>STANCER</h1>
            </div>
            
            <div class="scroll-area">
                <div class="perf">
                    <div class="label-row">
                        <label for="height">HEIGHT</label>
                        <div class="score" id="ratingOne">0.00</div>
                    </div>
                    <input type="range" id="height" name="height" step="0.01" min="0" max="20" value="0">
                </div>
        
                <div class="perf">
                    <div class="label-row">
                        <label for="wheelof">FRONT OFFSET</label>
                        <div class="score" id="ratingTwo">0.00</div>
                    </div>
                    <input type="range" id="wheelof" name="wheelof" step="0.1" min="0" max="10" value="0">
                </div>
        
                <div class="perf">
                    <div class="label-row">
                        <label for="wheelor">REAR OFFSET</label>
                        <div class="score" id="ratingThree">0.00</div>
                    </div>
                    <input type="range" id="wheelor" name="wheelor" step="0.1" min="0" max="10" value="0">
                </div>

                <div class="perf">
                    <div class="label-row">
                        <label for="wheelrf">FRONT ROTATION</label>
                        <div class="score" id="ratingFour">0.00</div>
                    </div>
                    <input type="range" id="wheelrf" name="wheelrf" step="0.1" min="0" max="10" value="0">
                </div>

                <div class="perf">
                    <div class="label-row">
                        <label for="wheelrr">REAR ROTATION</label>
                        <div class="score" id="ratingFive">0.00</div>
                    </div>
                    <input type="range" id="wheelrr" name="wheelrr" step="0.1" min="0" max="10" value="0">
                </div>
            </div>

            <div class="footer">
                <button id="close" type="submit">SAVE CHANGES</button>
            </div>
        </form>
    </div>
    <script src='script.js'></script>
</body>
</html>
